# ./workflow/proposal_state.yaml —— auto 全局状态中枢
# 放在项目根目录，由 auto 独享读写
# 各阶段 skill 不读取此文件
#
# 字段权限分类（详见 docs/workflow-contract.md §4）：
#   config   —— 启动时由 auto 写入一次，之后只读
#   pipeline —— auto 写入，但仅在独立验证 result 文件后
#   evidence —— 各 skill 在其 result 文件中写入，auto 只汇总

version: "2.0"
last_updated: ""

# ============================================================
# config：不可变配置（auto 启动时写入一次，之后只读）
# ============================================================
config:
  project:
    title: ""
    type: ""                  # NSFC_青年 / NSFC_面上 / 重点 / 标书 / 基金 / unknown
    target_words: 0
    target_pages: 0

  # 最少调研轮次——即使 exit_criteria 满足，未达 min_rounds 也不跳出
  min_rounds: 2
  max_rounds: 5

  # 不可跳过的阶段列表
  required_stages:
    - "10-review"

  auto_mode: false

  auto_exit_criteria:
    min_strong_claims: 3
    min_papers_digested: 10
    convergence_rounds: 2   # 连续 N 轮 synthesis 无本质变化

  # 文档格式宏：标题编号由 markdown 注入，还是由 reference docx 的 Heading 样式自动生成
  # false（默认）：模板标题不自带编号，09-assemble 必须向 markdown 标题注入 1 / 1.1 / 1.1.1
  # true：模板 Heading 1-4 已绑定自动编号，09-assemble 跳过 markdown 编号注入，避免 Word 双编号
  document_format:
    template_heading_numbering: false

  mode_settings:
    collaborative:
      pause_at_gates: true
      pause_between_stages: false
      require_confirmation_for_blocked: true
    autonomous:
      pause_at_gates: false
      pause_between_stages: false
      require_confirmation_for_blocked: true   # 阻塞仍需人工

# ============================================================
# pipeline：auto 管理的阶段状态（仅在独立验证后写入）
# ============================================================
pipeline:
  stages:
    "01_topic":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "02_literature_plan":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "03_academic_search":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "04_paper_digest":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "05_synthesis":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "06_helm":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "07_outline":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "08_section_write":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "09_assemble":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "10_review":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""
    "11_output":
      status: "pending"
      completed_at: ""
      integrity_verified: false
      notes: ""

  current:
    stage: ""                 # 当前正在执行的 stage
    mode: "collaborative"     # collaborative / autonomous
    resume_point: ""          # 中断恢复点（stage 名 + 额外上下文）
    last_action: ""           # 上次执行的操作描述

  writing_loop:
    units_total: 0
    units_written: 0
    units_pending: 0
    units_blocked: 0
    last_unit_written: ""

  review_loop:
    iterations: 0
    p0_issues_remaining: 0
    max_iterations: 3

# ============================================================
# evidence：auto 只读缓存（从各 skill result 文件汇总，每次决策前交叉验证）
# ============================================================
evidence:
  rounds_completed: 0         # 来源：05_synthesis/latest_result.yaml（auto 不修改）
  current_round_convergence: false
  decision: ""                # continue / proceed_to_helm / pending_user
  quality:
    gap_strength: "unknown"   # 来源：05_synthesis/latest_result.yaml
    evidence_strong_claims: 0 # 来源：05_synthesis/latest_result.yaml
    papers_digested: 0        # 来源：04_paper_digest/paper_index.yaml
    argument_chain_score: 0.0
    outline_depth_score: 0.0
    volume_balance_score: 0.0
    review_p0_count: 0        # 来源：10_review/review_result.yaml
    ready_for_output: false   # 来源：10_review/review_result.yaml

# ============================================================
# 运行记录
# ============================================================
history:
  - timestamp: ""
    action: ""
    stage: ""
    result: ""                # completed / blocked / error
    integrity_check: ""       # passed / failed / skipped
    note: ""
